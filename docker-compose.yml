version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beatify-app
    environment:
      - INIT_DB=true
      - POPULATE_DB=true
    expose:
      - "5000"
    volumes:
      - ./instance:/app/instance

  nginx:
    image: nginx:1.27-alpine
    container_name: beatify-nginx
    ports:
      - "5000:80"
    depends_on:
      - app
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/app:ro
